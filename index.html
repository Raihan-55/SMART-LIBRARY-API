<!DOCTYPE html>
<html lang="id">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Smart Library</title>
        <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        h1, h2 { color: #333; }
        .books-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; margin: 20px 0; }
        .book-card { border: 1px solid #ccc; padding: 15px; background: #f9f9f9; }
        .book-card h3 { margin: 0 0 10px 0; }
        .book-info { font-size: 14px; margin: 5px 0; color: #555; }
        .stock-available { color: green; font-weight: bold; }
        .stock-empty { color: red; font-weight: bold; }
        .loan-section { border: 1px solid #ccc; padding: 20px; max-width: 400px; background: #f9f9f9; margin: 20px 0; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 8px; border: 1px solid #ccc; }
        .btn-pinjam { width: 100%; padding: 10px; background: #4CAF50; color: white; border: none; cursor: pointer; font-size: 16px; }
        .btn-pinjam:hover { background: #45a049; }
        .message { padding: 12px; margin: 10px 0; display: none; }
        .message.show { display: block; }
        .message.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .message.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
    </head>
    <body>
        <h1>Smart Library - Pinjam Buku</h1>

        <h2>Daftar Buku Tersedia</h2>
        <div id="booksContainer" class="books-grid">
            <p>Memuat data buku...</p>
        </div>

        <div class="loan-section">
            <h2>Pinjam Buku</h2>
            <div id="message" class="message"></div>

            <form id="loanForm" onsubmit="handleLoan(event)">
                <div class="form-group">
                    <label for="bookId">ID Buku</label>
                    <input type="text" id="bookId"
                        placeholder="8089c8ff-f309-4cdc-bd24-2e6e44d994d7"
                        required>
                </div>

                <div class="form-group">
                    <label for="memberId">ID Member</label>
                    <input type="text" id="memberId"
                        placeholder="fc44f80c-d4a4-4de7-b937-a8051cd62afe"
                        required>
                </div>

                <button type="submit" class="btn-pinjam">Pinjam</button>
            </form>
        </div>

        <script>
        const API_BASE = 'http://localhost:3000/api';

        function showMessage(message, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = message;
            messageEl.className = `message show ${type}`;
            setTimeout(() => messageEl.classList.remove('show'), 5000);
        }

        async function loadBooks() {
            try {
                const response = await fetch(`${API_BASE}/books`);
                const books = await response.json();
                const booksContainer = document.getElementById('booksContainer');

                if (!books || books.length === 0) {
                    booksContainer.innerHTML = '<p>Tidak ada buku tersedia.</p>';
                    return;
                }

                booksContainer.innerHTML = books.map(book => `
                    <div class="book-card">
                        <h3>${book.title}</h3>
                        <div class="book-info"><strong>ID:</strong> ${book.id}</div>
                        <div class="book-info"><strong>Penulis:</strong> ${book.author_name || 'Unknown'}</div>
                        <div class="book-info"><strong>Kategori:</strong> ${book.category_name || 'Unknown'}</div>
                        <div class="book-info"><strong>ISBN:</strong> ${book.isbn}</div>
                        <div class="stock-info"><span class="${book.available_copies > 0 ? 'stock-available' : 'stock-empty'}">Sisa Stok: ${book.available_copies} / ${book.total_copies}</span></div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('booksContainer').innerHTML = '<p>Gagal memuat buku. Pastikan backend berjalan di http://localhost:3000</p>';
            }
        }

        async function handleLoan(event) {
            event.preventDefault();
            const bookId = document.getElementById('bookId').value;
            const memberId = document.getElementById('memberId').value;

            try {
                const dueDate = new Date();
                dueDate.setDate(dueDate.getDate() + 7);
                const dueDateStr = dueDate.toISOString().split('T')[0];

                const response = await fetch(`${API_BASE}/loans`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        book_id: bookId,
                        member_id: memberId,
                        due_date: dueDateStr
                    })
                });

                const data = await response.json();
                if (response.ok) {
                    showMessage('Buku berhasil dipinjam!', 'success');
                    document.getElementById('loanForm').reset();
                    loadBooks();
                } else {
                    showMessage(`Error: ${data.error}`, 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage('Gagal. Pastikan backend berjalan.', 'error');
            }
        }

        document.addEventListener('DOMContentLoaded', loadBooks);
    </script>
    </body>
</html>
